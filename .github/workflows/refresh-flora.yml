name: Refresh FLoRA snapshot (daily)

on:
  schedule:
    # 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download flora.csv
        run: python scripts/refresh_flora.py

      - name: Compute author overlap
        run: python scripts/compute_author_overlap.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/flora.csv data/flora_meta.json data/author_overlap_data.json data/author_overlap_meta.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily FLoRA snapshot: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
